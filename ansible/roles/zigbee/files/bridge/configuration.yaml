homeassistant: true
permit_join: false

frontend:
  port: 8080
experimental:
  new_api: true

mqtt:
  base_topic: "zigbee"
  server: "mqtts://mosquitto:8883"
  ca: "/app/data/secure/ca.crt"
  client_id: "ZIGBEE_BRIDGE"
  user: "!secret mqtt_user"
  password: "!secret mqtt_password"
  reject_unauthorized: false
  include_device_information: true
  keepalive: 60
  version: 4

serial:
  port: "/dev/ttyACM0"
  disable_led: false

advanced:
  channel: 25
  cache_state: true
  log_level: "info"
  log_output:
    - "console"
  baudrate: 115200
  rtscts: true
  network_key: "!secret zigbee_network_key"
  last_seen: "ISO_8601"
  elapsed: true
  availability_timeout: 0
  report: true
  homeassistant_discovery_topic: "zigbee"
  homeassistant_status_topic: "hass/status"


- name: "create iot network"
  docker_network:
    name: "{{ docker_bridge_name }}"

- name: "run zigbee bridge container"
  docker_container:
    image: "koenkk/zigbee2mqtt:1.16.0"
    name: "zigbee-bridge"
    restart_policy: "unless-stopped"
    recreate: true
    detach: true
    pull: true
    networks:
      - name: "{{ docker_bridge_name }}"
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"
    ports:
      - "8099:8080"
    volumes:
      - "/etc/docker/zigbee:/app/data"
      - "/etc/timezone:/etc/timezone:ro"

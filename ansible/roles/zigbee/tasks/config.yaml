- name: "copy zigbee bridge files"
  copy:
    src: "files/bridge/"
    dest: "/etc/docker/zigbee/"

- name: "copy ca certificate"
  copy:
    src: "../.secrets/ca/ca.crt"
    dest: "/etc/docker/zigbee/secure/"
    mode: "644"

- name: "copy devices"
  copy:
    src: "files/devices"
    dest: "/etc/docker/zigbee/"

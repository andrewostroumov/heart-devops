- id: "1580657732450"
  alias: Turn on aqara light when motion is detected
  description: ""
  trigger:
    - entity_id: binary_sensor.0x00158d0003f36469_occupancy
      platform: state
      to: "on"
  condition:
    - condition: state
      entity_id: light.aqara_hub_fed8
      state: "off"
    - condition: or
      conditions:
        - condition: numeric_state
          entity_id: sensor.0x00158d0003f36469_illuminance
          below: 25
        - condition: state
          entity_id: sun.sun
          state: "below_horizon"
  action:
    - data:
        brightness: 255
        entity_id: light.aqara_hub_fed8
        rgb_color:
          - 255
          - 255
          - 255
      service: light.turn_on
- id: "1580659530371"
  alias: Turn off aqara light when motion is clear
  description: ""
  trigger:
    - entity_id: binary_sensor.0x00158d0003f36469_occupancy
      for: 00:05:00
      platform: state
      to: "off"
  condition:
    - condition: state
      entity_id: light.aqara_hub_fed8
      state: "on"
  action:
    - data:
        entity_id: light.aqara_hub_fed8
      service: light.turn_off
- id: "1580657732451"
  alias: Turn on gledopto light when motion is detected
  description: ""
  trigger:
    - entity_id: binary_sensor.0x00158d00044b1132_occupancy
      platform: state
      to: "on"
  condition:
    - condition: state
      entity_id: light.0x00124b002113a5b2_light_cct
      state: "off"
    - condition: state
      entity_id: binary_sensor.c7b6ed93_automation_light
      state: "off"
    - condition: or
      conditions:
        - condition: numeric_state
          entity_id: sensor.0x00158d00044b1132_illuminance
          below: 25
        - condition: state
          entity_id: sun.sun
          state: "below_horizon"
  action:
    - data:
        brightness: 30
        entity_id: light.0x00124b002113a5b2_light_cct
        kelvin: 3500
      service: light.turn_on
    - data:
        payload: active
        qos: 0
        retain: true
        topic: hass/automation/light/c7b6ed93
      service: mqtt.publish
- id: "1580659530372"
  alias: Turn off gledopto light when motion is clear
  description: ""
  trigger:
    - entity_id: binary_sensor.0x00158d00044b1132_occupancy
      for: 00:05:00
      platform: state
      to: "off"
  condition:
    - condition: state
      entity_id: binary_sensor.c7b6ed93_automation_light
      state: "on"
  action:
    - data:
        entity_id: light.0x00124b002113a5b2_light_cct
      service: light.turn_off
    - data:
        payload: inactive
        qos: 0
        retain: true
        topic: hass/automation/light/c7b6ed93
      service: mqtt.publish
- id: "1580662281241"
  alias: "Alarm trigger"
  description: ""
  trigger:
    - entity_id: binary_sensor.0x00158d0003f36469_occupancy
      platform: state
      to: "on"
    - entity_id: binary_sensor.0x00158d00044b1132_occupancy
      platform: state
      to: "on"
  condition:
    - condition: state
      entity_id: alarm_control_panel.f36e737f
      state: armed_away
  action:
    - service: alarm_control_panel.alarm_trigger
      entity_id: alarm_control_panel.f36e737f
- id: "1580662281252"
  alias: "Process pending alarm"
  trigger:
    - platform: state
      entity_id: alarm_control_panel.f36e737f
      to: "pending"
  action:
    - service: notify.heart_security_tg
      data:
        message: "The alarm pending"
        title: "Pending!"
- id: "1580662281251"
  alias: "Process triggered alarm"
  trigger:
    - platform: state
      entity_id: alarm_control_panel.f36e737f
      to: "triggered"
  action:
    - service: notify.heart_security_tg
      data:
        message: "The alarm has been triggered"
        title: "Alarm!"
    - service: mqtt.publish
      data:
        payload: '{"warning":{"duration":120,"mode":"emergency","strobe":true}}'
        qos: 0
        retain: true
        topic: zigbee/0x000d6f0014f82b49/set
- id: "1580662281253"
  alias: "Process disarmed alarm"
  trigger:
    - platform: state
      entity_id: alarm_control_panel.f36e737f
      from: "triggered"
      to: "disarmed"
  action:
    - service: notify.heart_security_tg
      data:
        message: "The alarm has been disarmed after triggered"
        title: "Disarmed!"
    - service: mqtt.publish
      data:
        payload: '{"warning":{"duration":0,"mode":"stop","strobe":false}}'
        qos: 0
        retain: true
        topic: zigbee/0x000d6f0014f82b49/set
- id: "1580662281260"
  alias: "Color arming"

cards:
  - type: vertical-stack
    cards:
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.0e8b9f4c_temperature
            name: "Living Room Temperature"
            min: 15
            max: 30
            severity:
              green: 15
              yellow: 25
              red: 30
          - type: gauge
            entity: sensor.0e8b9f4c_humidity
            name: "Living Room Humidity"
            min: 20
            max: 75
            severity:
              green: 50
              yellow: 35
              red: 20
          - type: gauge
            entity: sensor.0e8b9f4c_co2
            name: "Living Room CO2"
            min: 400
            max: 1200
            severity:
              green: 400
              yeelow: 800
              red: 1000
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.fb0dd915_temperature
            name: "Bedroom Temperature"
            min: 15
            max: 30
            severity:
              green: 15
              yellow: 25
              red: 30
          - type: gauge
            entity: sensor.fb0dd915_humidity
            name: "Bedroom Humidity"
            min: 20
            max: 75
            severity:
              green: 50
              yellow: 35
              red: 20
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.fb0dd915_co2
            name: "Bedroom CO2"
            min: 400
            max: 1200
            severity:
              green: 400
              yeelow: 800
              red: 1000

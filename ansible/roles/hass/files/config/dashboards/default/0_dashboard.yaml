          - type: sensor
            entity: sensor.0x00158d0004216ea2_temperature
            name: "Outside Temperature"
            graph: line
          - type: sensor
            entity: sensor.0x00158d0004216ea2_humidity
            name: "Outside Humidity"
            graph: line

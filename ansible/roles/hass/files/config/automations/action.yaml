- id: "1000000000010"
  alias: "Turn on cooking"
  description: ""
  trigger:
    - entity_id: sensor.0x04cf8cdf3c79818a_action
      platform: state
      to: "button_1_single"
  action:
    - data:
        brightness: 255
        kelvin: 5000
        entity_id: light.32ebdcd1_color_bulb
      service: light.turn_on

- id: "1000000000011"
  alias: "Turn on cooking dark"
  description: ""
  trigger:
    - entity_id: sensor.0x04cf8cdf3c79818a_action
      platform: state
      to: "button_1_double"
  action:
    - data:
        brightness: 127
        kelvin: 4000
        entity_id: light.32ebdcd1_color_bulb
      service: light.turn_on

- id: "1000000000012"
  alias: "Turn off cooking"
  description: ""
  trigger:
    - entity_id: sensor.0x04cf8cdf3c79818a_action
      platform: state
      to: "button_1_hold"
  action:
    - data:
        entity_id: light.32ebdcd1_color_bulb
      service: light.turn_off


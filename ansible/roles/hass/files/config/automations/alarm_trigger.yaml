- id: "1580662281241"
  alias: "Alarm trigger"
  trigger:
    - entity_id: binary_sensor.0x00158d0003f36469_occupancy
      platform: state
      to: "on"
    - entity_id: binary_sensor.0x00158d00044b1132_occupancy
      platform: state
      to: "on"
  condition:
    - condition: state
      entity_id: alarm_control_panel.f36e737f
      state: armed_away
  action:
    - service: alarm_control_panel.alarm_trigger
      entity_id: alarm_control_panel.f36e737f

- id: "1580662281252"
  alias: "Process pending alarm"
  trigger:
    - platform: state
      entity_id: alarm_control_panel.f36e737f
      to: "pending"
  action:
    - service: notify.heart_security_tg
      data:
        message: "The alarm pending"
        title: "Pending!"

- id: "1580662281251"
  alias: "Process triggered alarm"
  trigger:
    - platform: state
      entity_id: alarm_control_panel.f36e737f
      to: "triggered"
  action:
    - service: notify.heart_security_tg
      data:
        message: "The alarm has been triggered"
        title: "Alarm!"
    - service: mqtt.publish
      data:
        payload: '{"warning":{"duration":120,"mode":"emergency","strobe":true}}'
        qos: 0
        retain: true
        topic: zigbee/0x000d6f0014f82b49/set

- id: "1580662281253"
  alias: "Process disarmed alarm"
  trigger:
    - platform: state
      entity_id: alarm_control_panel.f36e737f
      from: "triggered"
      to: "disarmed"
  action:
    - service: notify.heart_security_tg
      data:
        message: "The alarm has been disarmed after triggered"
        title: "Disarmed!"
    - service: mqtt.publish
      data:
        payload: '{"warning":{"duration":0,"mode":"stop","strobe":false}}'
        qos: 0
        retain: true
        topic: zigbee/0x000d6f0014f82b49/set
